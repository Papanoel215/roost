<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" width="1080" height="760" role="img" aria-label="Roost logo system">
  <defs>
    <filter id="s2" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#7A4A2E" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1080" height="760" rx="24" fill="#F4F1EC"/>
  <text x="48" y="66" font-family="'Bricolage Grotesque','Trebuchet MS','Inter',sans-serif" font-size="28" font-weight="800" fill="#2A251F">Roost — système de logo</text>
  <text x="48" y="94" font-family="Inter,sans-serif" font-size="14" fill="#6B6358">Symbole = plumbob facetté (clin d'œil à l'indicateur de santé de l'interface) · wordmark Bricolage Grotesque</text>

  <!-- Primary lockup -->
  <rect x="48" y="120" width="984" height="180" rx="20" fill="#FFFFFF" stroke="#ECE6DD"/>
  <text x="72" y="150" font-family="Inter,sans-serif" font-size="12" fill="#A89F92" letter-spacing="1">LOCKUP PRINCIPAL</text>
  <g filter="url(#s2)" transform="translate(104,168) scale(1.06)">
    <path d="M50,4 L8,46 L50,46 Z" fill="#F2A98C" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M50,4 L92,46 L50,46 Z" fill="#E07856" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M8,46 L50,96 L50,46 Z" fill="#2FB3A3" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M92,46 L50,96 L50,46 Z" fill="#1E8C7F" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M84,11 C84.5,16 85,16.5 90,18 C85,19.5 84.5,20 84,25 C83.5,20 83,19.5 78,18 C83,16.5 83.5,16 84,11 Z" fill="#FFFFFF" fill-opacity="0.92"/>
  </g>
  <text x="232" y="252" font-family="'Bricolage Grotesque','Trebuchet MS','Inter',sans-serif" font-size="84" font-weight="800" letter-spacing="-2" fill="#2A251F">Roost</text>

  <!-- Row of 3 variants -->
  <!-- App icon -->
  <rect x="48" y="332" width="312" height="200" rx="20" fill="#FFFFFF" stroke="#ECE6DD"/>
  <text x="72" y="360" font-family="Inter,sans-serif" font-size="12" fill="#A89F92" letter-spacing="1">ICÔNE D'APP</text>
  <rect x="138" y="374" width="132" height="132" rx="30" fill="#FAF7F2" stroke="#ECE6DD"/>
  <g filter="url(#s2)" transform="translate(165,401) scale(0.78)">
    <path d="M50,4 L8,46 L50,46 Z" fill="#F2A98C"/>
    <path d="M50,4 L92,46 L50,46 Z" fill="#E07856"/>
    <path d="M8,46 L50,96 L50,46 Z" fill="#2FB3A3"/>
    <path d="M92,46 L50,96 L50,46 Z" fill="#1E8C7F"/>
    <path d="M84,11 C84.5,16 85,16.5 90,18 C85,19.5 84.5,20 84,25 C83.5,20 83,19.5 78,18 C83,16.5 83.5,16 84,11 Z" fill="#FFFFFF" fill-opacity="0.92"/>
  </g>

  <!-- Reversed -->
  <rect x="384" y="332" width="312" height="200" rx="20" fill="#FFFFFF" stroke="#ECE6DD"/>
  <text x="408" y="360" font-family="Inter,sans-serif" font-size="12" fill="#A89F92" letter-spacing="1">INVERSÉ (COULEUR)</text>
  <rect x="474" y="374" width="132" height="132" rx="30" fill="#161311"/>
  <g transform="translate(501,401) scale(0.78)">
    <path d="M50,4 L8,46 L50,46 Z" fill="#F2A98C"/>
    <path d="M50,4 L92,46 L50,46 Z" fill="#E07856"/>
    <path d="M8,46 L50,96 L50,46 Z" fill="#2FB3A3"/>
    <path d="M92,46 L50,96 L50,46 Z" fill="#1E8C7F"/>
    <path d="M84,11 C84.5,16 85,16.5 90,18 C85,19.5 84.5,20 84,25 C83.5,20 83,19.5 78,18 C83,16.5 83.5,16 84,11 Z" fill="#FFFFFF" fill-opacity="0.92"/>
  </g>

  <!-- Monochrome -->
  <rect x="720" y="332" width="312" height="200" rx="20" fill="#FFFFFF" stroke="#ECE6DD"/>
  <text x="744" y="360" font-family="Inter,sans-serif" font-size="12" fill="#A89F92" letter-spacing="1">MONOCHROME</text>
  <g transform="translate(760,388) scale(0.66)">
    <path d="M50,4 L8,46 L50,96 L92,46 Z" fill="#2A251F"/>
    <path d="M8,46 L92,46 M50,4 L50,96" fill="none" stroke="#FAF7F2" stroke-width="2.4" stroke-opacity="0.55" stroke-linecap="round"/>
  </g>
  <text x="838" y="452" font-family="'Bricolage Grotesque','Trebuchet MS','Inter',sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="#2A251F">Roost</text>

  <!-- Mono reversed -->
  <rect x="48" y="556" width="470" height="148" rx="20" fill="#161311"/>
  <text x="72" y="584" font-family="Inter,sans-serif" font-size="12" fill="#B5AB9E" letter-spacing="1">MONOCHROME INVERSÉ</text>
  <g transform="translate(80,600) scale(0.58)">
    <path d="M50,4 L8,46 L50,96 L92,46 Z" fill="#FAF7F2"/>
    <path d="M8,46 L92,46 M50,4 L50,96" fill="none" stroke="#161311" stroke-width="2.4" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>
  <text x="150" y="652" font-family="'Bricolage Grotesque','Trebuchet MS','Inter',sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="#FAF7F2">Roost</text>

  <!-- Palette -->
  <rect x="542" y="556" width="490" height="148" rx="20" fill="#FFFFFF" stroke="#ECE6DD"/>
  <text x="566" y="584" font-family="Inter,sans-serif" font-size="12" fill="#A89F92" letter-spacing="1">PALETTE</text>
  <g font-family="Inter,sans-serif" font-size="9" fill="#6B6358" text-anchor="middle">
    <rect x="566" y="600" width="44" height="44" rx="12" fill="#E07856"/><text x="588" y="660">#E07856</text>
    <rect x="630" y="600" width="44" height="44" rx="12" fill="#2FB3A3"/><text x="652" y="660">#2FB3A3</text>
    <rect x="694" y="600" width="44" height="44" rx="12" fill="#3DBE7A"/><text x="716" y="660">#3DBE7A</text>
    <rect x="758" y="600" width="44" height="44" rx="12" fill="#F2B23C"/><text x="780" y="660">#F2B23C</text>
    <rect x="822" y="600" width="44" height="44" rx="12" fill="#E5564B"/><text x="844" y="660">#E5564B</text>
    <rect x="886" y="600" width="44" height="44" rx="12" fill="#FAF7F2" stroke="#D9D1C5"/><text x="908" y="660">#FAF7F2</text>
    <rect x="950" y="600" width="44" height="44" rx="12" fill="#161311"/><text x="972" y="660">#161311</text>
  </g>

  <text x="48" y="734" font-family="Inter,sans-serif" font-size="13" fill="#6B6358">Roost — nom retenu. Pensez à finaliser le dépôt de marque (classe logicielle) et le domaine.</text>
</svg>
