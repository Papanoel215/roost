<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Roost — social share image">
  <defs>
    <filter id="og" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#7A4A2E" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="#FAF7F2"/>

  <!-- accent plumbobs, coin haut-droit -->
  <g opacity="0.9">
    <path d="M1052,70 L1030,100 L1052,130 L1074,100 Z" fill="#3DBE7A" opacity="0.85"/>
    <path d="M1116,120 L1098,145 L1116,170 L1134,145 Z" fill="#2FB3A3" opacity="0.85"/>
    <path d="M996,128 L982,148 L996,168 L1010,148 Z" fill="#F2B23C" opacity="0.8"/>
  </g>

  <!-- symbole principal (plumbob) -->
  <g filter="url(#og)" transform="translate(110,205) scale(2.0)">
    <path d="M50,4 L8,46 L50,46 Z" fill="#F2A98C" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M50,4 L92,46 L50,46 Z" fill="#E07856" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M8,46 L50,96 L50,46 Z" fill="#2FB3A3" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M92,46 L50,96 L50,46 Z" fill="#1E8C7F" stroke="#2A251F" stroke-opacity="0.12" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M84,11 C84.5,16 85,16.5 90,18 C85,19.5 84.5,20 84,25 C83.5,20 83,19.5 78,18 C83,16.5 83.5,16 84,11 Z" fill="#FFFFFF" fill-opacity="0.92"/>
  </g>

  <text x="360" y="350" font-family="'Bricolage Grotesque','Trebuchet MS','Inter',sans-serif" font-size="140" font-weight="800" letter-spacing="-3" fill="#2A251F">Roost</text>
  <text x="364" y="428" font-family="Inter,sans-serif" font-size="38" font-weight="500" fill="#6B6358">Pilotez toute votre équipe d'agents IA.</text>
  <text x="364" y="480" font-family="Inter,sans-serif" font-size="28" font-weight="600" fill="#2FB3A3">Claude + Gemini, sous un même toit.</text>
</svg>
